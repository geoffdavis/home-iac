version: '3'

vars:
  ENVIRONMENT: '{{.ENVIRONMENT | default "home"}}'
  TF_DIR: 'environments/{{.ENVIRONMENT}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  init:
    desc: Initialize OpenTofu
    dir: '{{.TF_DIR}}'
    cmds:
      - op run --env-file ../../.env -- tofu init

  plan:
    desc: Plan changes
    dir: '{{.TF_DIR}}'
    cmds:
      - op run --env-file ../../.env -- tofu plan -out=tfplan

  apply:
    desc: Apply planned changes
    dir: '{{.TF_DIR}}'
    cmds:
      - op run --env-file ../../.env -- tofu apply tfplan
    preconditions:
      - sh: test -f tfplan
        msg: "No plan file found. Run 'task plan' first."

  destroy:
    desc: Destroy all managed infrastructure
    dir: '{{.TF_DIR}}'
    prompt: This will destroy all infrastructure. Are you sure?
    cmds:
      - op run --env-file ../../.env -- tofu destroy

  fmt:
    desc: Format all Terraform files
    cmds:
      - tofu fmt -recursive .

  validate:
    desc: Validate Terraform configuration
    dir: '{{.TF_DIR}}'
    cmds:
      - tofu validate

  state:list:
    desc: List resources in state
    dir: '{{.TF_DIR}}'
    cmds:
      - op run --env-file ../../.env -- tofu state list

  clean:
    desc: Clean up generated files
    cmds:
      - rm -rf environments/*/.terraform
      - rm -f environments/*/tfplan
      - rm -f environments/*/.terraform.lock.hcl
