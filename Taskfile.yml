version: '3'

vars:
  ENVIRONMENT: '{{.ENVIRONMENT | default "home"}}'
  TF_DIR: 'environments/{{.ENVIRONMENT}}'

dotenv: ['.env']

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  init:
    desc: Initialize OpenTofu
    dir: '{{.TF_DIR}}'
    cmds:
      - tofu init

  plan:
    desc: Plan changes
    dir: '{{.TF_DIR}}'
    env:
      AWS_ACCESS_KEY_ID:
        sh: op read "op://${OP_AWS_VAULT}/${OP_AWS_ITEM}/${OP_AWS_ACCESS_KEY_FIELD}"
      AWS_SECRET_ACCESS_KEY:
        sh: op read "op://${OP_AWS_VAULT}/${OP_AWS_ITEM}/${OP_AWS_SECRET_KEY_FIELD}"
    cmds:
      - tofu plan -out=tfplan

  apply:
    desc: Apply planned changes
    dir: '{{.TF_DIR}}'
    env:
      AWS_ACCESS_KEY_ID:
        sh: op read "op://${OP_AWS_VAULT}/${OP_AWS_ITEM}/${OP_AWS_ACCESS_KEY_FIELD}"
      AWS_SECRET_ACCESS_KEY:
        sh: op read "op://${OP_AWS_VAULT}/${OP_AWS_ITEM}/${OP_AWS_SECRET_KEY_FIELD}"
    cmds:
      - tofu apply tfplan
    preconditions:
      - sh: test -f {{.TF_DIR}}/tfplan
        msg: "No plan file found. Run 'task plan' first."

  destroy:
    desc: Destroy all managed infrastructure
    dir: '{{.TF_DIR}}'
    env:
      AWS_ACCESS_KEY_ID:
        sh: op read "op://${OP_AWS_VAULT}/${OP_AWS_ITEM}/${OP_AWS_ACCESS_KEY_FIELD}"
      AWS_SECRET_ACCESS_KEY:
        sh: op read "op://${OP_AWS_VAULT}/${OP_AWS_ITEM}/${OP_AWS_SECRET_KEY_FIELD}"
    prompt: This will destroy all infrastructure. Are you sure?
    cmds:
      - tofu destroy

  fmt:
    desc: Format all Terraform files
    cmds:
      - tofu fmt -recursive .

  validate:
    desc: Validate Terraform configuration
    dir: '{{.TF_DIR}}'
    cmds:
      - tofu validate

  state:list:
    desc: List resources in state
    dir: '{{.TF_DIR}}'
    env:
      AWS_ACCESS_KEY_ID:
        sh: op read "op://${OP_AWS_VAULT}/${OP_AWS_ITEM}/${OP_AWS_ACCESS_KEY_FIELD}"
      AWS_SECRET_ACCESS_KEY:
        sh: op read "op://${OP_AWS_VAULT}/${OP_AWS_ITEM}/${OP_AWS_ACCESS_KEY_FIELD}"
    cmds:
      - tofu state list

  clean:
    desc: Clean up generated files
    cmds:
      - rm -rf environments/*/.terraform
      - rm -f environments/*/tfplan
      - rm -f environments/*/.terraform.lock.hcl
